- name: BFS
  family: graph
  big_o: O(V+E)
  idea: Explore level by level. Shortest path in an unweighted graph.
  code: |
    # adj[u] = node u's neighbour nodes (v)
    from collections import deque
    q, seen = deque([src]), {src}
    while q:
        u = q.popleft()
        for v in adj[u]:
            if v not in seen:
                seen.add(v); q.append(v)

- name: DFS
  family: graph
  big_o: O(V+E)
  idea: Go deep, then backtrack. Trees, paths, components, cycles.
  code: |
    def dfs(u):
        seen.add(u)
        for v in adj[u]:
            if v not in seen:
                dfs(v)

- name: Topological Sort
  family: graph
  big_o: O(V+E)
  idea: Order a DAG so every edge points forward (Kahn's algorithm).
  code: |
    from collections import deque
    indeg = [0]*n
    for u in range(n):
        for v in adj[u]: indeg[v] += 1
    q = deque(u for u in range(n) if indeg[u]==0)
    order = []
    while q:
        u = q.popleft(); order.append(u)
        for v in adj[u]:
            indeg[v] -= 1
            if indeg[v] == 0: q.append(v)
    # len(order) < n  =>  graph has a cycle

- name: Dijkstra
  family: graph
  big_o: O(E log V)
  idea: Shortest path with non-negative weights, via a min-heap.
  code: |
    import heapq
    dist = [float('inf')]*n; dist[src] = 0
    pq = [(0, src)]
    while pq:
        d, u = heapq.heappop(pq)
        if d > dist[u]: continue
        for v, w in adj[u]:
            if d + w < dist[v]:
                dist[v] = d + w
                heapq.heappush(pq, (dist[v], v))

- name: Union-Find (DSU)
  family: graph
  big_o: ~O(1) amort.
  idea: Merge sets, test connectivity, detect cycles. Path compression.
  code: |
    parent = list(range(n))
    def find(x):
        while parent[x] != x:
            # path-compress
            parent[x] = parent[parent[x]]
            x = parent[x]
        return x
    def union(a, b):
        parent[find(a)] = find(b)

- name: Binary Search
  family: search
  big_o: O(log n)
  idea: Halve a sorted (or monotonic) space. Also "search on the answer".
  code: |
    def lower_bound(a, ok):    # first True index
        lo, hi = 0, len(a)     # on answer: hi=max+1
        while lo < hi:
            mid = (lo + hi) // 2
            if ok(mid): hi = mid
            else:       lo = mid + 1
        return lo

- name: Two Pointers
  family: pointer
  big_o: O(n)
  idea: Walk a sorted array from both ends, or fast/slow on a list.
  code: |
    def two_sum(a, target):    # a is sorted
        i, j = 0, len(a) - 1
        while i < j:
            s = a[i] + a[j]
            if s == target: return (i, j)
            if s < target: i += 1
            else:          j -= 1

- name: Sliding Window
  family: pointer
  big_o: O(n)
  idea: Grow right, shrink left to keep an invariant (e.g. ≤ k distinct).
  code: |
    from collections import Counter
    left = 0; cnt = Counter()
    for right, x in enumerate(a):
        cnt[x] += 1
        while len(cnt) > k:          # shrink
            cnt[a[left]] -= 1
            if cnt[a[left]] == 0: del cnt[a[left]]
            left += 1
        best = max(best, right - left + 1)
    # exactly k  =  atMost(k) - atMost(k-1)

- name: Heap / Top-k
  family: heap
  big_o: O(n log k)
  idea: Keep the k best seen so far in a size-k min-heap.
  code: |
    import heapq
    heap = []                 # min-heap, size k
    for x in a:
        heapq.heappush(heap, x)
        if len(heap) > k: heapq.heappop(heap)
    # heap[0] is the k-th largest

- name: Merge Intervals
  family: heap
  big_o: O(n log n)
  idea: Sort by start, then fold each interval into the last if they touch.
  code: |
    a.sort()
    merged = [a[0]]
    for s, e in a[1:]:
        if s <= merged[-1][1]:
            merged[-1][1] = max(merged[-1][1], e)
        else:
            merged.append([s, e])

- name: Dynamic Programming
  family: dp
  big_o: O(n·W)
  idea: Build answers from overlapping subproblems (0/1 knapsack shown).
  code: |
    def knapsack(items, W):
        dp = [0]*(W + 1)
        for wt, val in items:
            for c in range(W, wt-1, -1):   # 0/1: down
                dp[c] = max(dp[c], dp[c-wt] + val)
        return dp[W]

- name: Memoization
  family: dp
  big_o: O(states)
  idea: Top-down DP — recurse on subproblems, cache each result in a dict.
  code: |
    memo = {}
    def fib(n):
        if n <= 1: return n
        if n in memo: return memo[n]
        memo[n] = fib(n-1) + fib(n-2)
        return memo[n]

- name: Backtracking
  family: exhaust
  big_o: O(2ⁿ) / O(n!)
  idea: Choose, recurse, undo. Permutations & subsets when n is tiny.
  code: |
    def backtrack(start, path):
        res.append(path[:])       # record
        for i in range(start, n):
            path.append(a[i])
            backtrack(i + 1, path)  # i+1 => subsets
            path.pop()            # undo

- name: Monotonic Stack
  family: stack
  big_o: O(n)
  idea: Stack holds a sorted run; pop when the new value breaks it.
  example: 'next greater value to the right; [2,1,3] → [3,3,-1]'
  code: |
    stack = []; res = [-1]*n
    for i, x in enumerate(a):
        while stack and a[stack[-1]] < x:
            res[stack.pop()] = x
        stack.append(i)

- name: Prefix Sums
  family: other
  big_o: O(n) build
  idea: Precompute cumulative totals for O(1) range-sum queries.
  code: |
    prefix = [0]*(n + 1)
    for i, x in enumerate(a):
        prefix[i+1] = prefix[i] + x
    # sum(l..r) = prefix[r+1] - prefix[l]
    # subarray==k: count prefix[] in a hashmap

- name: Trie
  family: other
  big_o: O(len) / op
  idea: Prefix tree for word lookups and "starts-with" queries.
  code: |
    def insert(root, word):
        cur = root
        for c in word:
            cur = cur.setdefault(c, {})
        cur['$'] = True       # word ends here

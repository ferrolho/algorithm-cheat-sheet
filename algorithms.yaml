- name: BFS
  family: graph
  big_o: O(V+E)
  idea: Explore level by level. Shortest path in an unweighted graph.
  code: |
    # adj[u] = node u's neighbour nodes (v)
    from collections import deque
    q, seen = deque([src]), {src}
    while q:
        u = q.popleft()
        for v in adj[u]:
            if v not in seen:
                seen.add(v); q.append(v)

- name: DFS
  family: graph
  big_o: O(V+E)
  idea: Go deep, then backtrack. Trees, paths, components, cycles.
  code: |
    def dfs(u):
        seen.add(u)
        for v in adj[u]:
            if v not in seen:
                dfs(v)

- name: Topological Sort
  family: graph
  big_o: O(V+E)
  idea: Order a DAG so every edge points forward (Kahn's algorithm).
  code: |
    from collections import deque
    indeg = [0] * n
    for u in range(n):
        for v in adj[u]: indeg[v] += 1
    q = deque(u for u in range(n) if indeg[u]==0)
    order = []
    while q:
        u = q.popleft(); order.append(u)
        for v in adj[u]:
            indeg[v] -= 1
            if indeg[v] == 0: q.append(v)
    # len(order) < n  =>  graph has a cycle

- name: Dijkstra
  family: graph
  big_o: O(E log V)
  idea: Shortest path with non-negative weights, via a min-heap.
  code: |
    import heapq
    dist = [float('inf')] * n; dist[src] = 0
    pq = [(0, src)]
    while pq:
        d, u = heapq.heappop(pq)
        if d > dist[u]: continue
        for v, w in adj[u]:
            if d + w < dist[v]:
                dist[v] = d + w
                heapq.heappush(pq, (dist[v], v))

- name: Union-Find (DSU)
  family: graph
  big_o: ~O(1) amort.
  idea: Merge sets, test connectivity, detect cycles. Path compression.
  code: |
    parent = list(range(n))
    def find(x):
        while parent[x] != x:
            parent[x] = parent[parent[x]]  # compress
            x = parent[x]
        return x
    def union(a, b):
        parent[find(a)] = find(b)

- name: Binary Search
  family: search
  big_o: O(log n)
  idea: Halve a sorted (or monotonic) space. Also "search on the answer".
  example: 'first index ≥ x; [1,3,3,5], x=3 → 1'
  code: |
    def lower_bound(arr, ok):  # first True index
        lo, hi = 0, len(arr)   # on answer: hi=max+1
        while lo < hi:
            mid = (lo + hi) // 2
            if ok(mid): hi = mid
            else:       lo = mid + 1
        return lo

- name: Two Pointers
  family: pointer
  big_o: O(n)
  idea: Walk a sorted array from both ends, or fast/slow on a list.
  example: 'pair summing to target; [2,7,11], 9 → (0,1)'
  code: |
    def two_sum(arr, target):  # arr is sorted
        i, j = 0, len(arr) - 1
        while i < j:
            s = arr[i] + arr[j]
            if s == target: return (i, j)
            if s < target: i += 1
            else:          j -= 1

- name: Sliding Window
  family: pointer
  big_o: O(n)
  idea: Grow right, shrink left to keep an invariant (e.g. ≤ k distinct).
  example: 'longest with ≤ k distinct; "eceba", k=2 → 3'
  code: |
    from collections import Counter
    left = 0; cnt = Counter()
    for right, x in enumerate(arr):
        cnt[x] += 1
        while len(cnt) > k:          # shrink
            cnt[arr[left]] -= 1
            if cnt[arr[left]] == 0: del cnt[arr[left]]
            left += 1
        best = max(best, right - left + 1)
    # exactly k  =  atMost(k) - atMost(k-1)

- name: Heap / Top-k
  family: heap
  big_o: O(n log k)
  idea: Keep the k best seen so far in a size-k min-heap.
  code: |
    import heapq
    heap = []                 # min-heap, size k
    for x in arr:
        heapq.heappush(heap, x)
        if len(heap) > k: heapq.heappop(heap)
    # heap[0] is the k-th largest

- name: Merge Intervals
  family: heap
  big_o: O(n log n)
  idea: Sort by start, then fold each interval into the last if they touch.
  example: '[[1,3],[2,6],[8,10]] → [[1,6],[8,10]]'
  code: |
    intervals.sort()
    merged = [intervals[0]]
    for a, b in intervals[1:]:
        if a <= merged[-1][1]:
            merged[-1][1] = max(merged[-1][1], b)
        else:
            merged.append([a, b])

- name: Dynamic Programming
  family: dp
  big_o: O(coins·amt)
  idea: Build answers from overlapping subproblems.
  example: 'coins [1,2,5], amount 11 → 3'
  code: |
    # dp[t] = running best (fewest coins to make t)
    dp = [0] + [float('inf')] * amount
    for coin in coins:  # consider one more option
        # ascending/descending => can/cannot reuse
        for t in range(coin, amount + 1):
            # update every subproblem with choice
            dp[t] = min(dp[t], dp[t-coin] + 1)
    # answer = dp[amount] (inf => impossible)

- name: Memoization
  family: dp
  big_o: O(states)
  idea: Recurse on subproblems, cache each result in a dict.
  example: 'nth Fibonacci; fib(6) → 8'
  code: |
    memo = {}
    def fib(num):
        if num <= 1: return num
        if num in memo: return memo[num]
        memo[num] = fib(num-1) + fib(num-2)
        return memo[num]

- name: Backtracking
  family: exhaust
  big_o: O(2ⁿ) / O(n!)
  idea: Choose, recurse, undo. Permutations & subsets when n is tiny.
  example: 'subsets of [1,2] → [], [1], [1,2], [2]'
  code: |
    def backtrack(start, path):
        res.append(path[:])         # record
        for i in range(start, n):
            path.append(arr[i])
            backtrack(i + 1, path)  # i+1 => subsets
            path.pop()              # undo

- name: Monotonic Stack
  family: stack
  big_o: O(n)
  idea: Stack holds a sorted run; pop when the new value breaks it.
  example: 'next greater value to the right; [2,1,3] → [3,3,-1]'
  code: |
    stack = []; res = [-1] * n
    for i, x in enumerate(arr):
        while stack and arr[stack[-1]] < x:
            res[stack.pop()] = x
        stack.append(i)

- name: Prefix Sums
  family: other
  big_o: O(n) build
  idea: Precompute cumulative totals for O(1) range-sum queries.
  code: |
    prefix = [0] * (n + 1)
    for i, x in enumerate(arr):
        prefix[i+1] = prefix[i] + x
    # sum(l..r) = prefix[r+1] - prefix[l]
    # subarray==k: count prefix[] in a hashmap

- name: Trie
  family: other
  big_o: O(len) / op
  idea: Prefix tree for word lookups and "starts-with" queries.
  code: |
    def insert(root, word):
        cur = root
        for c in word:
            cur = cur.setdefault(c, {})
        cur['$'] = True       # word ends here

- name: BFS
  family: graph
  big_o: O(V+E)
  idea: Explore level by level. Shortest path in an unweighted graph.
  code: |
    from collections import deque
    q, seen = deque([s]), {s}
    while q:
        u = q.popleft()
        for v in adj[u]:
            if v not in seen:
                seen.add(v); q.append(v)

- name: DFS
  family: graph
  big_o: O(V+E)
  idea: Go deep, then backtrack. Trees, paths, components, cycles.
  code: |
    def dfs(u):
        seen.add(u)
        for v in adj[u]:
            if v not in seen:
                dfs(v)

- name: Topological Sort
  family: graph
  big_o: O(V+E)
  idea: Order a DAG so every edge points forward (Kahn's algorithm).
  code: |
    indeg = [0]*n
    for u in range(n):
        for v in adj[u]: indeg[v] += 1
    q = deque(u for u in range(n) if indeg[u]==0)
    order = []
    while q:
        u = q.popleft(); order.append(u)
        for v in adj[u]:
            indeg[v] -= 1
            if indeg[v] == 0: q.append(v)
    # len(order) < n  =>  graph has a cycle

- name: Dijkstra
  family: graph
  big_o: O(E log V)
  idea: Shortest path with non-negative weights, via a min-heap.
  code: |
    import heapq
    dist = [INF]*n; dist[s] = 0
    pq = [(0, s)]
    while pq:
        d, u = heapq.heappop(pq)
        if d > dist[u]: continue
        for v, w in adj[u]:
            if d + w < dist[v]:
                dist[v] = d + w
                heapq.heappush(pq, (dist[v], v))

- name: Union-Find (DSU)
  family: graph
  big_o: ~O(1) amort.
  idea: Merge sets, test connectivity, detect cycles. Path compression.
  code: |
    par = list(range(n))
    def find(x):
        while par[x] != x:
            par[x] = par[par[x]]   # path-compress
            x = par[x]
        return x
    def union(a, b):
        par[find(a)] = find(b)

- name: Binary Search
  family: search
  big_o: O(log n)
  idea: Halve a sorted (or monotonic) space. Also "search on the answer".
  code: |
    lo, hi = 0, len(a)      # answer: hi = max+1
    while lo < hi:
        mid = (lo + hi) // 2
        if ok(mid): hi = mid        # first True
        else:       lo = mid + 1
    return lo

- name: Two Pointers
  family: pointer
  big_o: O(n)
  idea: Walk a sorted array from both ends, or fast/slow on a list.
  code: |
    i, j = 0, len(a) - 1
    while i < j:
        s = a[i] + a[j]
        if s == target: return (i, j)
        if s < target: i += 1
        else:          j -= 1

- name: Sliding Window
  family: pointer
  big_o: O(n)
  idea: Grow right, shrink left to keep an invariant (e.g. ≤ k distinct).
  code: |
    left = 0; cnt = Counter()
    for right, x in enumerate(a):
        cnt[x] += 1
        while len(cnt) > k:          # shrink
            cnt[a[left]] -= 1
            if cnt[a[left]] == 0: del cnt[a[left]]
            left += 1
        best = max(best, right - left + 1)
    # exactly k  =  atMost(k) - atMost(k-1)

- name: Heap / Top-k
  family: heap
  big_o: O(n log k)
  idea: Keep the k best seen so far in a size-k min-heap.
  code: |
    import heapq
    h = []                    # min-heap, size k
    for x in a:
        heapq.heappush(h, x)
        if len(h) > k: heapq.heappop(h)
    # h[0] is the k-th largest

- name: Merge Intervals
  family: heap
  big_o: O(n log n)
  idea: Sort by start, then fold each interval into the last if they touch.
  code: |
    a.sort()
    out = [a[0]]
    for s, e in a[1:]:
        if s <= out[-1][1]:
            out[-1][1] = max(out[-1][1], e)
        else:
            out.append([s, e])

- name: Dynamic Programming
  family: dp
  big_o: O(n·W)
  idea: Build answers from overlapping subproblems (0/1 knapsack shown).
  code: |
    dp = [0]*(W + 1)
    for wt, val in items:
        for c in range(W, wt-1, -1):    # 0/1: down
            dp[c] = max(dp[c], dp[c-wt] + val)
    return dp[W]

- name: Backtracking
  family: exhaust
  big_o: O(2ⁿ) / O(n!)
  idea: Choose, recurse, undo. Permutations & subsets when n is tiny.
  code: |
    def bt(start, path):
        res.append(path[:])       # record
        for i in range(start, n):
            path.append(a[i])
            bt(i + 1, path)       # i+1 => subsets
            path.pop()            # undo

- name: Monotonic Stack
  family: stack
  big_o: O(n)
  idea: Stack holds a sorted run; pop when the new value breaks it.
  code: |
    st = []; res = [-1]*n
    for i, x in enumerate(a):
        while st and a[st[-1]] < x:   # next greater
            res[st.pop()] = x
        st.append(i)

- name: Prefix Sums
  family: other
  big_o: O(n) build
  idea: Precompute cumulative totals for O(1) range-sum queries.
  code: |
    pre = [0]*(n + 1)
    for i, x in enumerate(a):
        pre[i+1] = pre[i] + x
    # sum(l..r) = pre[r+1] - pre[l]
    # subarray==k: count pre[] in a hashmap

- name: Trie
  family: other
  big_o: O(len) / op
  idea: Prefix tree for word lookups and "starts-with" queries.
  code: |
    def add(root, w):
        cur = root
        for c in w:
            cur = cur.setdefault(c, {})
        cur['$'] = True       # word ends here
